<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>message_prof</title>
</head>
<body>
    <form action="" >
        <fieldset align = 'center' width = '80'>
            <legend><h2> <u>Envoyer un message au professeur</u></h2></legend>
            <table align="center"  width = '50%'>
                <tr>
            <th><label for="name">Nom : </label></th>
            <td><input type="text" id="name" size="70" required></td>
        </tr>
        <tr>
            <th><label for="email">Email :  </label></th>
            <td><input type="email" id="email" size="70" required></td>
        </tr>
        <tr>
            <th><label for="message">Message  : </label></th>
            <td><textarea name="message" id="message" rows="5" cols="69" required></textarea></td>
        </tr>
        <tr>
            <td  colspan="2"><input width="400px" type="submit" value="Envoyer"></td>
        </tr>
        <tr>
            <td colspan="2"><h3><a href="emploi-du-temps.HTML">Emploi Du Temps</a></h3></td>
        </tr>
    </table>

</fieldset>
    </form>

</body>
</html>
