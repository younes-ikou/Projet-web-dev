<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice 2</title>
</head>
<body>
    <script>
let nombreSecret = Math.floor(Math.random() *10) + 1;
let tentative;
let score = 0; 

do {
    tentative = parseInt(prompt("Devinez le nombre entre 1 et 10 :"));
    score++; 

    if (tentative < nombreSecret) {
        alert("Le nombre à deviner est plus grand.");
    } else if (tentative > nombreSecret) {
        alert("Le nombre à deviner est plus petit.");
    }
} while (tentative !== nombreSecret);

alert("Bravo ! Vous avez trouvé en " + score + " tentatives.");
    </script>
    
</body>
</html>
